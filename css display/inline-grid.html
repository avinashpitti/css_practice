<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline-grid</title>
    <style>
        .inline-grid{
            display: inline-grid;
            grid-template-columns: repeat(2,50px);
            gap: 20px;
            background: #ddd;
            padding: 15px;
        }

         .inline-grid div{
            background: orange;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="inline-grid">
  <div>A</div><div>B</div><div>C</div><div>D</div>
</div>
</body>
</html>
