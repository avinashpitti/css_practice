<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline-block</title>
    <style>
        .btn{
            display: inline-flex;
            background-color: purple;
            color: wheat;
            width: 120px;
            height: 40px;
            margin: 2px;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- display:inline-block : It can be modified like block elements but keeps elemetns inline. -->
     <!-- display:inline-flex : If you want to modify child elements then you can use it -->
    <div class="btn">Button1</div>
    <div class="btn">Button2</div>
</body>
</html>
