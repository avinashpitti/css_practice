<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display:None</title>
    <style>
        .none{
            display: none;
        }

        .hidden{
            visibility: hidden;
        }

    </style>
</head>
<body>
    <div class="none">you can't see me, even you don't know I was existed</div>
    <div class="visibility">I am visible</div>

    <div class="hidden">It occupies space,but not visible</div>
    <div class="visibility">I am visible</div>
</body>
</html>
