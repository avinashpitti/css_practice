<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display:list-item</title>
    <style>
        .item{
            display: list-item;
            list-style-type: disc;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="item">Item One</div>
    <div class="item">Item Two</div>
    <div class="item">Item Three</div>
</body>
</html>
